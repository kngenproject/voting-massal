<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voting App</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>
<body>

<h1>🔐 Voting App</h1>

<div class="card">
  <h3>Buat Sesi</h3>
  <input id="sessionName" placeholder="Nama sesi unik">
  <button class="primary" onclick="createSession()">Buat</button>
</div>

<div class="card">
  <h3>Tambah Kandidat</h3>
  <input id="sessionId" placeholder="Nama sesi">
  <input id="candidateName" placeholder="Nama kandidat">
  <button class="success" onclick="addCandidate()">Tambah</button>
</div>

<div class="card">
  <h3>Daftar Voting</h3>
  <div id="sessions"></div>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
