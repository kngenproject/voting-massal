<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VoteKu — Sistem Voting Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #0d1117;
  --ink-soft:   #374151;
  --ink-muted:  #9ca3af;
  --surface:    #ffffff;
  --surface-2:  #f8fafc;
  --border:     #e5e7eb;
  --accent:     #1a5f4a;
  --accent-lt:  #d1fae5;
  --accent-dk:  #134035;
  --red:        #dc2626;
  --red-lt:     #fee2e2;
  --amber:      #d97706;
  --amber-lt:   #fef3c7;
  --blue:       #2563eb;
  --blue-lt:    #dbeafe;
  --radius:     14px;
  --shadow:     0 2px 8px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg:  0 12px 40px rgba(0,0,0,.12);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--surface-2);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── HEADER ──────────────────────────────── */
header {
  background: var(--ink);
  padding: 0 24px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.logo {
  font-family: 'Lora', serif;
  font-size: 1.2rem;
  color: #fff;
  letter-spacing: -.02em;
}
.logo span { color: #6ee7b7; }
.header-badge {
  font-size: .72rem; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink-muted);
  background: rgba(255,255,255,.07);
  padding: 4px 10px; border-radius: 20px;
}

/* ── LAYOUT ──────────────────────────────── */
.page {
  max-width: 840px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

/* ── TABS ────────────────────────────────── */
.tabs {
  display: flex; gap: 4px;
  background: var(--border);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
}
.tab {
  flex: 1; text-align: center;
  padding: 9px;
  border-radius: 9px;
  cursor: pointer;
  font-size: .85rem; font-weight: 600;
  color: var(--ink-muted);
  transition: all .2s;
  user-select: none;
}
.tab.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow);
}

.panel { display: none; }
.panel.active { display: block; }

/* ── CARD ────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: .78rem; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink-muted);
  margin-bottom: 16px;
}

/* ── FORM ────────────────────────────────── */
.form-row {
  display: flex; gap: 10px; flex-wrap: wrap;
  align-items: flex-end;
}
.field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
.field label { font-size: .8rem; font-weight: 600; color: var(--ink-soft); }

input[type="text"], input[type="password"] {
  width: 100%;
  padding: 9px 13px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-family: inherit; font-size: .88rem;
  color: var(--ink);
  background: var(--surface-2);
  outline: none;
  transition: border .18s, box-shadow .18s;
}
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,95,74,.12);
  background: #fff;
}

/* ── BUTTONS ─────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  border: none; border-radius: 9px;
  cursor: pointer;
  font-family: inherit; font-size: .85rem; font-weight: 600;
  transition: all .18s; white-space: nowrap;
}
.btn-primary   { background: var(--accent);    color: #fff; }
.btn-primary:hover  { background: var(--accent-dk); transform: translateY(-1px); }
.btn-red       { background: var(--red);       color: #fff; }
.btn-red:hover { background: #b91c1c; }
.btn-ghost     { background: var(--surface-2); color: var(--ink-soft); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-sm { padding: 6px 13px; font-size: .8rem; border-radius: 7px; }
.btn:disabled { opacity: .5; pointer-events: none; }

/* ── SESSION CARDS ───────────────────────── */
.session-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.session-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}
.session-name {
  font-weight: 700; font-size: 1rem; letter-spacing: -.01em;
}
.session-header-right {
  display: flex; align-items: center; gap: 8px;
}
.badge {
  font-size: .72rem; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; padding: 4px 10px; border-radius: 20px;
}
.badge-green { background: var(--accent-lt); color: var(--accent); }
.badge-red   { background: var(--red-lt);    color: var(--red); }
.badge-gray  { background: var(--border);    color: var(--ink-muted); }

.candidates-list {
  padding: 12px 20px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.candidate-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 12px;
}
.cand-name { font-weight: 500; }
.cand-votes {
  font-size: .82rem; color: var(--ink-muted); font-weight: 600;
  white-space: nowrap;
}
.vote-bar-wrap {
  grid-column: 1 / -1;
  height: 5px; background: var(--border); border-radius: 4px;
  overflow: hidden;
}
.vote-bar {
  height: 100%; background: var(--accent);
  border-radius: 4px;
  transition: width .5s ease;
}

/* ── EMPTY STATE ─────────────────────────── */
.empty {
  text-align: center; padding: 48px 20px;
  color: var(--ink-muted);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty p { font-size: .9rem; }

/* ── TOAST ───────────────────────────────── */
#toast-wrap {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 9999;
}
.toast {
  padding: 11px 18px;
  border-radius: 10px;
  font-size: .85rem; font-weight: 600;
  box-shadow: var(--shadow-lg);
  animation: toastIn .25s ease;
  max-width: 280px;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.toast-success { background: var(--ink); color: #fff; }
.toast-error   { background: var(--red); color: #fff; }
.toast-warn    { background: var(--amber); color: #fff; }

/* ── DIVIDER ─────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 18px 0; }

/* ── STATS ───────────────────────────────── */
.stats-row {
  display: flex; gap: 12px; flex-wrap: wrap;
}
.stat-box {
  flex: 1; min-width: 100px;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  text-align: center;
}
.stat-num { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: .75rem; color: var(--ink-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }

/* ── CONFIRM MODAL ───────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 360px; width: 100%;
  box-shadow: var(--shadow-lg);
  animation: popUp .2s ease;
}
@keyframes popUp {
  from { transform: scale(.93); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.modal-title { font-weight: 700; font-size: 1rem; margin-bottom: 8px; }
.modal-msg   { font-size: .88rem; color: var(--ink-soft); margin-bottom: 20px; line-height: 1.5; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ── ADMIN LOCK ──────────────────────────── */
.lock-overlay {
  background: var(--surface-2);
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  color: var(--ink-muted);
  font-size: .9rem;
}
.lock-overlay .icon { font-size: 2rem; margin-bottom: 8px; }

/* ── SEARCH BAR ──────────────────────────── */
.search-wrap {
  position: relative;
  margin-bottom: 16px;
}
.search-wrap input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: inherit; font-size: .9rem;
  color: var(--ink);
  background: var(--surface);
  outline: none;
  transition: border .18s, box-shadow .18s;
  box-shadow: var(--shadow);
}
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,95,74,.12);
}
.search-icon {
  position: absolute; left: 13px; top: 50%;
  transform: translateY(-50%);
  font-size: 1rem; pointer-events: none;
  color: var(--ink-muted);
}
.search-clear {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: var(--border); border: none;
  border-radius: 50%; width: 22px; height: 22px;
  font-size: .75rem; cursor: pointer; color: var(--ink-soft);
  display: none; align-items: center; justify-content: center;
}
.search-clear.visible { display: flex; }
.search-count {
  font-size: .78rem; color: var(--ink-muted);
  margin-bottom: 10px; text-align: right;
}

/* ── RESPONSIVE ──────────────────────────── */
@media (max-width: 600px) {
  /* Layout */
  .page { padding: 20px 14px 80px; }
  .card { padding: 16px; }

  /* Tabs */
  .tab { font-size: .78rem; padding: 8px 6px; }

  /* Form */
  .form-row { flex-direction: column; }
  .field { min-width: unset; width: 100%; }
  .form-row .btn { width: 100%; justify-content: center; }

  /* Session header — stack name + buttons */
  .session-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  .session-header-right {
    width: 100%;
    flex-wrap: wrap;
    gap: 6px;
  }
  .session-header-right .btn {
    flex: 1;
    justify-content: center;
    min-width: 0;
  }

  /* Candidate row */
  .candidate-row {
    grid-template-columns: 1fr auto;
    row-gap: 4px;
  }
  .cand-votes { grid-column: 1; font-size: .78rem; }
  .candidate-row .btn { grid-column: 2; grid-row: 1 / 3; align-self: center; }
  .vote-bar-wrap { grid-column: 1 / -1; }

  /* Stats */
  .stat-box { min-width: 80px; padding: 12px 10px; }
  .stat-num { font-size: 1.3rem; }

  /* Toast — full width bottom bar */
  #toast-wrap {
    left: 12px; right: 12px; bottom: 16px;
    align-items: stretch;
  }
  .toast { max-width: 100%; text-align: center; }
}
</style>
</head>

<body>

<header>
  <div class="logo">Vote<span>Ku</span></div>
  <div class="header-badge">⚡ Realtime</div>
</header>

<div id="toast-wrap"></div>

<div class="page">

  <!-- TABS -->
  <div class="tabs" role="tablist">
    <div class="tab active" onclick="switchTab('voter')" role="tab">🗳️ Voting</div>
    <div class="tab"       onclick="switchTab('admin')"  role="tab">⚙️ Kelola Sesi</div>
  </div>

  <!-- ── VOTER PANEL ── -->
  <div class="panel active" id="panel-voter">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Cari nama sesi..." oninput="filterSessions(this.value)">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-count" id="search-count" style="display:none"></div>
    <div id="voter-sessions">
      <div class="empty">
        <div class="empty-icon">⏳</div>
        <p>Memuat sesi voting...</p>
      </div>
    </div>
  </div>

  <!-- ── ADMIN PANEL ── -->
  <div class="panel" id="panel-admin">

    <div id="admin-content">

      <!-- Stats -->
      <div class="card" id="admin-stats">
        <div class="card-title">Ringkasan</div>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num" id="stat-sessions">0</div><div class="stat-lbl">Sesi</div></div>
          <div class="stat-box"><div class="stat-num" id="stat-active">0</div><div class="stat-lbl">Aktif</div></div>
          <div class="stat-box"><div class="stat-num" id="stat-votes">0</div><div class="stat-lbl">Total Vote</div></div>
        </div>
      </div>

      <!-- Buat sesi -->
      <div class="card">
        <div class="card-title">Buat Sesi Baru</div>
        <div class="form-row">
          <div class="field">
            <label>Nama Sesi</label>
            <input type="text" id="sessionName" placeholder="cth: pemilihan-osis-2025">
          </div>
          <button class="btn btn-primary" onclick="createSession()">+ Buat Sesi</button>
        </div>
        <p style="font-size:.78rem;color:var(--ink-muted);margin-top:8px;">
          Gunakan huruf kecil dan tanda hubung, tanpa spasi.
        </p>
      </div>

      <!-- Tambah kandidat -->
      <div class="card">
        <div class="card-title">Tambah Kandidat</div>
        <div class="form-row">
          <div class="field">
            <label>Nama Sesi</label>
            <input type="text" id="candidateSession" placeholder="Nama sesi yang sudah dibuat">
          </div>
          <div class="field">
            <label>Nama Kandidat</label>
            <input type="text" id="candidateName" placeholder="Nama kandidat">
          </div>
          <button class="btn btn-primary" onclick="addCandidate()">+ Tambah</button>
        </div>
      </div>

      <!-- Kelola sesi -->
      <div class="card">
        <div class="card-title">Kelola Sesi</div>
        <div id="admin-sessions">
          <div class="empty"><p>Belum ada sesi.</p></div>
        </div>
      </div>

    </div>
  </div>

</div><!-- /page -->

<script type="module">
// ─────────────────────────────────────────
// 🔥 FIREBASE CONFIG
// Ganti nilai di bawah dengan config Firebase project Anda.
// Cara mendapatkannya: Firebase Console → Project Settings → Your apps → Config
// ─────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyDMXJ3bTNX-bG70waPjUTvHxMiQZTUpybU",
  authDomain:        "voting-massal.firebaseapp.com",
  projectId:         "voting-massal",
  storageBucket:     "voting-massal.firebasestorage.app",
  messagingSenderId: "825776451499",
  appId:             "1:825776451499:web:5edf29d850e36c78b66cee"
};

// ─────────────────────────────────────────

import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc,
  updateDoc, increment, collection,
  addDoc, onSnapshot, deleteDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── TOAST ─────────────────────────────────
function toast(msg, type = "success") {
  const wrap = document.getElementById("toast-wrap");
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ── TABS ──────────────────────────────────
window.switchTab = (name) => {
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", (name==="voter"&&i===0)||(name==="admin"&&i===1));
  });
  document.querySelectorAll(".panel").forEach((p,i) => {
    p.classList.toggle("active", (name==="voter"&&i===0)||(name==="admin"&&i===1));
  });
};

// ── DEVICE ID ─────────────────────────────
function getDeviceId() {
  let id = localStorage.getItem("voteku_deviceId");
  if (!id) { id = crypto.randomUUID(); localStorage.setItem("voteku_deviceId", id); }
  return id;
}

// ── VOTE ──────────────────────────────────
window.vote = async (sessionId, candidateId, btn) => {
  btn.disabled = true;
  btn.textContent = "...";

  const deviceId = getDeviceId();
  const voterRef = doc(db, `sessions/${sessionId}/voters/${deviceId}`);

  const [voterSnap, sessionSnap] = await Promise.all([
    getDoc(voterRef),
    getDoc(doc(db, "sessions", sessionId))
  ]);

  if (voterSnap.exists()) {
    toast("⚠️ Perangkat ini sudah pernah voting!", "warn");
    btn.disabled = false; btn.textContent = "Vote"; return;
  }
  if (!sessionSnap.data()?.active) {
    toast("❌ Sesi voting sudah ditutup.", "error");
    btn.disabled = false; btn.textContent = "Vote"; return;
  }

  await updateDoc(doc(db, `sessions/${sessionId}/candidates/${candidateId}`), { votes: increment(1) });
  await setDoc(voterRef, { voted: true, time: Date.now() });

  toast("✅ Vote berhasil! Terima kasih.");
};

// ── CREATE SESSION ────────────────────────
window.createSession = async () => {
  const name = document.getElementById("sessionName").value.trim().toLowerCase().replace(/\s+/g, "-");
  if (!name) { toast("Isi nama sesi terlebih dahulu.", "warn"); return; }

  const ref  = doc(db, "sessions", name);
  const snap = await getDoc(ref);

  if (snap.exists()) { toast("❌ Nama sesi sudah digunakan!", "error"); return; }

  const creatorDeviceId = getDeviceId();

  await setDoc(ref, { active: true, createdAt: Date.now(), creatorDeviceId });
  document.getElementById("sessionName").value = "";
  toast(`✅ Sesi "${name}" berhasil dibuat!`);
};

// ── ADD CANDIDATE ─────────────────────────
window.addCandidate = async () => {
  const sessionId = document.getElementById("candidateSession").value.trim();
  const name      = document.getElementById("candidateName").value.trim();

  if (!sessionId || !name) { toast("Lengkapi semua field.", "warn"); return; }

  const sessionSnap = await getDoc(doc(db, "sessions", sessionId));
  if (!sessionSnap.exists()) { toast("❌ Sesi tidak ditemukan!", "error"); return; }

  await addDoc(collection(db, `sessions/${sessionId}/candidates`), { name, votes: 0 });
  document.getElementById("candidateName").value = "";
  toast(`✅ Kandidat "${name}" ditambahkan!`);
};

// ── TOGGLE SESSION ────────────────────────
window.toggleSession = async (id, current) => {
  await updateDoc(doc(db, "sessions", id), { active: !current });
  toast(`Sesi "${id}" ${current ? "ditutup" : "dibuka"}.`);
};

// ── CONFIRM MODAL ─────────────────────────
function showConfirm(title, msg, onConfirm) {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">${title}</div>
      <div class="modal-msg">${msg}</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">Batal</button>
        <button class="btn btn-red"   id="modal-ok">Hapus</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  const close = () => backdrop.remove();
  backdrop.querySelector("#modal-cancel").onclick = close;
  backdrop.querySelector("#modal-ok").onclick = () => { close(); onConfirm(); };
  backdrop.addEventListener("click", e => { if (e.target === backdrop) close(); });
}

// ── DELETE SESSION ────────────────────────
window.deleteSession = (id) => {
  showConfirm(
    "🗑️ Hapus Sesi",
    `Yakin ingin menghapus sesi <strong>"${id}"</strong>?<br>Semua kandidat dan data vote akan terhapus permanen.`,
    async () => {
      try {
        // Verifikasi kepemilikan sebelum hapus
        const sessionSnap = await getDoc(doc(db, "sessions", id));
        if (!sessionSnap.exists()) { toast("❌ Sesi tidak ditemukan.", "error"); return; }

        const sData = sessionSnap.data();
        const myDeviceId = getDeviceId();

        if (sData.creatorDeviceId !== myDeviceId) {
          toast("🚫 Kamu bukan pembuat sesi ini.", "error");
          return;
        }

        const [cSnap, vSnap, iSnap] = await Promise.all([
          getDocs(collection(db, `sessions/${id}/candidates`)),
          getDocs(collection(db, `sessions/${id}/voters`)),
          getDocs(collection(db, `sessions/${id}/ipVotes`)),
        ]);

        await Promise.all([
          ...cSnap.docs.map(d => deleteDoc(d.ref)),
          ...vSnap.docs.map(d => deleteDoc(d.ref)),
          ...iSnap.docs.map(d => deleteDoc(d.ref)),
        ]);

        await deleteDoc(doc(db, "sessions", id));
        toast(`🗑️ Sesi "${id}" berhasil dihapus.`);
      } catch (e) {
        toast(`❌ Gagal: ${e.message || e.code || "unknown error"}`, "error");
        console.error(e);
      }
    }
  );
};

// ── RENDER CANDIDATES ─────────────────────
function renderCandidates(sessionId, cSnap, container, isActive, isVoter) {
  if (cSnap.empty) {
    container.innerHTML = `<div class="empty"><p>Belum ada kandidat.</p></div>`;
    return;
  }

  const docs = [];
  cSnap.forEach(c => docs.push({ id: c.id, ...c.data() }));

  const totalVotes = docs.reduce((s, d) => s + (d.votes || 0), 0);

  container.innerHTML = "";
  docs.forEach(d => {
    const pct = totalVotes ? Math.round((d.votes / totalVotes) * 100) : 0;
    const row = document.createElement("div");
    row.className = "candidate-row";
    row.innerHTML = `
      <span class="cand-name">${d.name}</span>
      <span class="cand-votes">${d.votes} suara (${pct}%)</span>
      ${isVoter && isActive
        ? `<button class="btn btn-primary btn-sm" onclick="vote('${sessionId}','${d.id}',this)">Vote</button>`
        : isVoter
          ? `<span class="badge badge-gray">Tutup</span>`
          : ""}
      <div class="vote-bar-wrap" style="grid-column:1/-1">
        <div class="vote-bar" style="width:${pct}%"></div>
      </div>
    `;
    container.appendChild(row);
  });
}

// ── SEARCH / FILTER ──────────────────────
window.filterSessions = (q) => {
  const val = q.trim().toLowerCase();
  const clearBtn = document.getElementById("search-clear");
  const countEl  = document.getElementById("search-count");

  clearBtn.classList.toggle("visible", val.length > 0);

  const cards = document.querySelectorAll("#voter-sessions .session-card");
  let visible = 0;

  cards.forEach(card => {
    const name = card.querySelector(".session-name")?.textContent.toLowerCase() || "";
    const match = name.includes(val);
    card.style.display = match ? "" : "none";
    if (match) visible++;
  });

  if (val && cards.length > 0) {
    countEl.style.display = "block";
    countEl.textContent = `${visible} dari ${cards.length} sesi ditemukan`;
  } else {
    countEl.style.display = "none";
  }
};

window.clearSearch = () => {
  const input = document.getElementById("search-input");
  input.value = "";
  filterSessions("");
  input.focus();
};

// ── REALTIME LISTENER ────────────────────
// Track per-session vote totals & unsubscribe old listeners on re-render
const sessionVoteTotals = new Map();   // id → vote count
let   candidateUnsubs   = new Map();   // id → unsubscribe fn
let   sessionCount = 0;
let   activeCount  = 0;

function updateStats() {
  let total = 0;
  sessionVoteTotals.forEach(v => total += v);
  document.getElementById("stat-sessions").textContent = sessionCount;
  document.getElementById("stat-active").textContent   = activeCount;
  document.getElementById("stat-votes").textContent    = total;
}

onSnapshot(collection(db, "sessions"), (snap) => {
  const voterContainer = document.getElementById("voter-sessions");
  const adminContainer = document.getElementById("admin-sessions");

  // Unsubscribe all old candidate listeners before re-render
  candidateUnsubs.forEach(unsub => unsub());
  candidateUnsubs.clear();
  sessionVoteTotals.clear();

  voterContainer.innerHTML = "";
  adminContainer.innerHTML = "";

  if (snap.empty) {
    voterContainer.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>Belum ada sesi voting.</p></div>`;
    adminContainer.innerHTML = `<div class="empty"><p>Belum ada sesi.</p></div>`;
    sessionCount = 0; activeCount = 0; updateStats();
    return;
  }

  sessionCount = 0; activeCount = 0;
  const myDeviceId = getDeviceId();

  snap.forEach(docSnap => {
    const data = docSnap.data();
    const id   = docSnap.id;
    sessionCount++;
    if (data.active) activeCount++;
    sessionVoteTotals.set(id, 0);

    // ── Voter card
    const vCard = document.createElement("div");
    vCard.className = "session-card";
    vCard.innerHTML = `
      <div class="session-header">
        <span class="session-name">${id}</span>
        <div class="session-header-right">
          <span class="badge ${data.active ? "badge-green" : "badge-red"}">
            ${data.active ? "🟢 Berlangsung" : "🔴 Ditutup"}
          </span>
        </div>
      </div>
      <div class="candidates-list" id="vc-${id}">
        <p style="color:var(--ink-muted);font-size:.85rem">Memuat kandidat...</p>
      </div>
    `;
    voterContainer.appendChild(vCard);

    // ── Admin card
    const isOwner = data.creatorDeviceId === myDeviceId;
    const aCard = document.createElement("div");
    aCard.className = "session-card";
    aCard.style.marginBottom = "10px";
    aCard.innerHTML = `
      <div class="session-header">
        <div>
          <span class="session-name">${id}</span>
          ${isOwner ? `<span style="font-size:.72rem;color:var(--accent);font-weight:600;margin-left:8px;">✏️ Milik kamu</span>` : ""}
        </div>
        <div class="session-header-right">
          <span class="badge ${data.active ? "badge-green" : "badge-gray"}">
            ${data.active ? "Aktif" : "Nonaktif"}
          </span>
          <button class="btn btn-ghost btn-sm" onclick="toggleSession('${id}',${data.active})">
            ${data.active ? "Tutup Sesi" : "Buka Sesi"}
          </button>
          ${isOwner ? `<button class="btn btn-red btn-sm" onclick="deleteSession('${id}')">🗑️ Hapus</button>` : ""}
        </div>
      </div>
      <div class="candidates-list" id="ac-${id}"></div>
    `;
    adminContainer.appendChild(aCard);

    // ── Realtime candidates (store unsubscribe fn)
    const unsub = onSnapshot(collection(db, `sessions/${id}/candidates`), (cSnap) => {
      let sessionTotal = 0;
      cSnap.forEach(c => { sessionTotal += (c.data().votes || 0); });
      sessionVoteTotals.set(id, sessionTotal);   // update only this session

      const vcDiv = document.getElementById(`vc-${id}`);
      const acDiv = document.getElementById(`ac-${id}`);

      if (vcDiv) renderCandidates(id, cSnap, vcDiv, data.active, true);
      if (acDiv) renderCandidates(id, cSnap, acDiv, data.active, false);

      updateStats();
    });
    candidateUnsubs.set(id, unsub);
  });

  // Re-apply search filter after re-render
  const q = document.getElementById("search-input")?.value || "";
  if (q) filterSessions(q);
});
</script>

</body>
</html>
