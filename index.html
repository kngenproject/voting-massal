<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #0d1117;
  --ink-soft:  #374151;
  --ink-muted: #9ca3af;
  --surface:   #ffffff;
  --surface-2: #f8fafc;
  --border:    #e5e7eb;
  --accent:    #1a5f4a;
  --accent-lt: #d1fae5;
  --accent-dk: #134035;
  --red:       #dc2626;
  --red-lt:    #fee2e2;
  --amber:     #d97706;
  --radius:    14px;
  --shadow:    0 2px 8px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
  --nav-h:     64px;
  --header-h:  54px;
}

html, body {
  height: 100%; overflow: hidden;
  font-family: 'Sora', sans-serif;
  background: var(--surface-2);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.6;
}

/* ── HEADER ─────────────────────────────── */
header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--ink);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  z-index: 200;
}
.logo {
  font-family: 'Lora', serif;
  font-size: 1.15rem; color: #fff;
  letter-spacing: -.02em;
}
.logo span { color: #6ee7b7; }
.header-badge {
  font-size: .68rem; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink-muted);
  background: rgba(255,255,255,.07);
  padding: 3px 9px; border-radius: 20px;
}

/* ── PANELS ─────────────────────────────── */
.panels {
  position: fixed;
  top: var(--header-h);
  bottom: var(--nav-h);
  left: 0; right: 0;
  overflow: hidden;
}
.panel {
  position: absolute; inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px 8px;
  opacity: 0; pointer-events: none;
  transform: translateY(10px);
  transition: opacity .2s ease, transform .2s ease;
}
.panel.active {
  opacity: 1; pointer-events: all;
  transform: translateY(0);
}

/* ── BOTTOM NAV ─────────────────────────── */
nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 200;
  box-shadow: 0 -4px 16px rgba(0,0,0,.06);
}
.nav-item {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  cursor: pointer;
  color: var(--ink-muted);
  font-size: .68rem; font-weight: 600;
  letter-spacing: .03em;
  transition: color .18s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  border: none; background: none;
  padding: 0;
}
.nav-item .nav-icon {
  font-size: 1.35rem;
  transition: transform .2s ease;
}
.nav-item.active {
  color: var(--accent);
}
.nav-item.active .nav-icon {
  transform: translateY(-2px);
}

/* ── CARD ───────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: .72rem; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink-muted);
  margin-bottom: 14px;
}

/* ── FORM ───────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.field label { font-size: .78rem; font-weight: 600; color: var(--ink-soft); }
input[type="text"] {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-family: inherit; font-size: .88rem;
  color: var(--ink);
  background: var(--surface-2);
  outline: none;
  transition: border .18s, box-shadow .18s;
}
input[type="text"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,95,74,.12);
  background: #fff;
}

/* ── BUTTONS ────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 18px;
  border: none; border-radius: 9px;
  cursor: pointer;
  font-family: inherit; font-size: .85rem; font-weight: 600;
  transition: all .18s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary  { background: var(--accent);    color: #fff; }
.btn-primary:active { background: var(--accent-dk); }
.btn-red      { background: var(--red);       color: #fff; }
.btn-red:active { background: #b91c1c; }
.btn-ghost    { background: var(--surface-2); color: var(--ink-soft); border: 1.5px solid var(--border); }
.btn-ghost:active { background: var(--border); }
.btn-sm       { padding: 6px 12px; font-size: .78rem; border-radius: 7px; }
.btn-full     { width: 100%; }
.btn:disabled { opacity: .45; pointer-events: none; }

/* ── SEARCH ─────────────────────────────── */
.search-wrap {
  position: relative; margin-bottom: 12px;
}
.search-wrap input {
  padding-left: 38px; padding-right: 36px;
  border-radius: 10px;
  background: var(--surface);
  box-shadow: var(--shadow);
}
.search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: .95rem; color: var(--ink-muted); pointer-events: none;
}
.search-clear {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: var(--border); border: none;
  border-radius: 50%; width: 20px; height: 20px;
  font-size: .7rem; cursor: pointer; color: var(--ink-soft);
  display: none; align-items: center; justify-content: center;
}
.search-clear.visible { display: flex; }
.search-count {
  font-size: .74rem; color: var(--ink-muted);
  margin-bottom: 8px; text-align: right;
  display: none;
}

/* ── POLLING CARDS ──────────────────────── */
.session-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
  animation: fadeUp .25s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.session-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.session-name { font-weight: 700; font-size: .95rem; }
.session-header-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.badge {
  font-size: .68rem; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; padding: 3px 9px; border-radius: 20px;
  white-space: nowrap;
}
.badge-green { background: var(--accent-lt); color: var(--accent); }
.badge-red   { background: var(--red-lt);    color: var(--red); }
.badge-gray  { background: var(--border);    color: var(--ink-muted); }

.candidates-list { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 9px; }
.candidate-row {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto auto;
  align-items: center;
  gap: 4px 10px;
}
.cand-name  { font-weight: 500; font-size: .9rem; grid-column: 1; grid-row: 1; }
.cand-votes { font-size: .76rem; color: var(--ink-muted); font-weight: 600; grid-column: 1; grid-row: 2; }
.cand-action { grid-column: 2; grid-row: 1 / 3; display:flex; align-items:center; }
.vote-bar-wrap {
  grid-column: 1 / -1; grid-row: 3;
  height: 4px; background: var(--border); border-radius: 4px;
  overflow: hidden; margin-top: 2px;
}
.vote-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width .5s ease; }

/* ── EMPTY ──────────────────────────────── */
.empty {
  text-align: center; padding: 48px 20px;
  color: var(--ink-muted);
}
.empty-icon { font-size: 2.2rem; margin-bottom: 10px; }
.empty p { font-size: .88rem; }

/* ── STATS ──────────────────────────────── */
.stats-row { display: flex; gap: 10px; margin-bottom: 12px; }
.stat-box {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num { font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-lbl { font-size: .68rem; color: var(--ink-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-top: 3px; }

/* ── MANAGE CARD BUTTONS ────────────────── */
.manage-actions { display: flex; gap: 7px; flex-wrap: wrap; padding: 10px 16px 14px; }

/* ── OPTION INPUT ROW ───────────────────── */
.option-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
}
.option-row input { flex: 1; margin: 0; }
.option-del {
  background: none; border: none; cursor: pointer;
  font-size: 1rem; color: var(--ink-muted); padding: 4px 6px;
  flex-shrink: 0;
}

/* ── SHARE BTN ──────────────────────────── */
.share-btn {
  padding: 5px 10px;
  font-size: .72rem;
}

/* ── TOAST ──────────────────────────────── */
#toast-wrap {
  position: fixed; bottom: calc(var(--nav-h) + 10px);
  left: 12px; right: 12px;
  display: flex; flex-direction: column; gap: 7px;
  z-index: 9999; align-items: stretch;
}
.toast {
  padding: 11px 16px;
  border-radius: 10px;
  font-size: .83rem; font-weight: 600;
  box-shadow: var(--shadow-lg);
  animation: toastIn .22s ease;
  text-align: center;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.toast-success { background: var(--ink); color: #fff; }
.toast-error   { background: var(--red); color: #fff; }
.toast-warn    { background: var(--amber); color: #fff; }

/* ── CONFIRM MODAL ──────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 22px;
  max-width: 340px; width: 100%;
  box-shadow: var(--shadow-lg);
  animation: popUp .18s ease;
}
@keyframes popUp { from { transform: scale(.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-title { font-weight: 700; font-size: .98rem; margin-bottom: 8px; }
.modal-msg   { font-size: .85rem; color: var(--ink-soft); margin-bottom: 18px; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<header>
  <div class="logo">Vote<span>Ku</span></div>
  <div class="header-badge">⚡ Realtime</div>
</header>

<div id="toast-wrap"></div>

<!-- ── PANELS ── -->
<div class="panels">

  <!-- Panel 1: Ikut Polling -->
  <div class="panel active" id="panel-vote">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Cari polling..." oninput="filterSessions(this.value)">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-count" id="search-count" style="display:none;"></div>
    <div id="voter-sessions">
      <div class="empty">
        <div class="empty-icon">⏳</div>
        <p>Memuat polling...</p>
      </div>
    </div>
  </div>

  <!-- Panel 2: Buat Polling -->
  <div class="panel" id="panel-create">
    <div class="card">
      <div class="card-title">Buat Polling Baru</div>

      <div class="field">
        <label>Judul Polling</label>
        <input type="text" id="sessionName" placeholder="cth: menu-makan-siang">
        <span style="font-size:.72rem;color:var(--ink-muted);margin-top:4px;">Huruf kecil dan tanda hubung, tanpa spasi.</span>
      </div>

      <div class="field">
        <label>Pilihan / Opsi</label>
        <div id="options-list"></div>
        <button class="btn btn-ghost btn-sm" onclick="addOptionField()" style="align-self:flex-start;margin-top:2px;">+ Tambah Pilihan</button>
      </div>

      <button class="btn btn-primary btn-full" style="margin-top:6px;" onclick="createSessionWithOptions()">🚀 Buat Polling</button>
    </div>
  </div>

  <!-- Panel 3: Kelola -->
  <div class="panel" id="panel-manage">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="stat-sessions">0</div><div class="stat-lbl">Polling</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-active">0</div><div class="stat-lbl">Aktif</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-votes">0</div><div class="stat-lbl">Total Suara</div></div>
    </div>
    <div id="admin-sessions">
      <div class="empty"><p>Belum ada polling.</p></div>
    </div>
  </div>

</div>

<!-- ── BOTTOM NAV ── -->
<nav>
  <button class="nav-item active" id="nav-vote"   onclick="switchTab('vote')">
    <span class="nav-icon">🗳️</span>
    <span>Polling</span>
  </button>
  <button class="nav-item"        id="nav-create" onclick="switchTab('create')">
    <span class="nav-icon">➕</span>
    <span>Buat</span>
  </button>
  <button class="nav-item"        id="nav-manage" onclick="switchTab('manage')">
    <span class="nav-icon">⚙️</span>
    <span>Kelola</span>
  </button>
</nav>

<script type="module">
// ─────────────────────────────────────────
// 🔥 FIREBASE CONFIG
// Ganti nilai di bawah dengan config Firebase project Anda.
// Cara mendapatkannya: Firebase Console → Project Settings → Your apps → Config
// ─────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyDMXJ3bTNX-bG70waPjUTvHxMiQZTUpybU",
  authDomain:        "voting-massal.firebaseapp.com",
  projectId:         "voting-massal",
  storageBucket:     "voting-massal.firebasestorage.app",
  messagingSenderId: "825776451499",
  appId:             "1:825776451499:web:5edf29d850e36c78b66cee"
};

// ─────────────────────────────────────────

import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc,
  updateDoc, increment, collection,
  addDoc, onSnapshot, deleteDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── TOAST ─────────────────────────────────
function toast(msg, type = "success") {
  const wrap = document.getElementById("toast-wrap");
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ── TABS ──────────────────────────────────
window.switchTab = (name) => {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.getElementById("panel-" + name)?.classList.add("active");
  document.getElementById("nav-"   + name)?.classList.add("active");
};

// ── DEVICE ID ─────────────────────────────
function getDeviceId() {
  let id = localStorage.getItem("voteku_deviceId");
  if (!id) { id = crypto.randomUUID(); localStorage.setItem("voteku_deviceId", id); }
  return id;
}

// ── VOTED SESSIONS (local cache) ─────────
// Stores sessionIds this device has voted in — survives re-renders
const votedSessions = new Set(
  JSON.parse(localStorage.getItem("voteku_voted") || "[]")
);
function markVoted(sessionId) {
  votedSessions.add(sessionId);
  localStorage.setItem("voteku_voted", JSON.stringify([...votedSessions]));
}

// ── VOTE ──────────────────────────────────
window.vote = async (sessionId, candidateId, btn) => {
  btn.disabled = true;
  btn.textContent = "...";

  try {
    const deviceId = getDeviceId();
    const voterRef = doc(db, `sessions/${sessionId}/voters/${deviceId}`);

    const [voterSnap, sessionSnap] = await Promise.all([
      getDoc(voterRef),
      getDoc(doc(db, "sessions", sessionId))
    ]);

    if (voterSnap.exists()) {
      markVoted(sessionId);
      toast("⚠️ Perangkat ini sudah pernah voting!", "warn");
      btn.disabled = false; btn.textContent = "Vote"; return;
    }
    if (!sessionSnap.data()?.active) {
      toast("❌ Sesi voting sudah ditutup.", "error");
      btn.disabled = false; btn.textContent = "Vote"; return;
    }

    await updateDoc(doc(db, `sessions/${sessionId}/candidates/${candidateId}`), { votes: increment(1) });
    await setDoc(voterRef, { voted: true, time: Date.now() });

    markVoted(sessionId);
    btn.textContent = "✓ Voted";
    toast("✅ Vote berhasil! Terima kasih.");
  } catch (e) {
    toast(`❌ Gagal vote: ${e.message || e.code || "unknown"}`, "error");
    btn.disabled = false;
    btn.textContent = "Vote";
  }
};

// ── ADD OPTION FIELD ──────────────────────
window.addOptionField = (value = "") => {
  const list = document.getElementById("options-list");
  const idx  = list.children.length;
  const wrap = document.createElement("div");
  wrap.style.cssText = "display:flex;gap:8px;align-items:center;";
  wrap.innerHTML = `
    <input type="text" class="option-input" placeholder="Pilihan ${idx + 1}" value="${value}"
      style="flex:1;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;
             font-family:inherit;font-size:.88rem;background:var(--surface-2);outline:none;">
    <button onclick="this.parentElement.remove()" style="background:none;border:none;
      cursor:pointer;font-size:1.1rem;color:var(--ink-muted);padding:4px 6px;" title="Hapus">✕</button>
  `;
  list.appendChild(wrap);
  wrap.querySelector("input").focus();
};

// Init 2 option fields on load
// Init 2 option fields immediately (type=module is already deferred)
addOptionField();
addOptionField();

// ── CREATE SESSION + OPTIONS ───────────────
window.createSessionWithOptions = async () => {
  const name = document.getElementById("sessionName").value.trim().toLowerCase().replace(/\s+/g, "-");
  if (!name) { toast("Isi judul polling terlebih dahulu.", "warn"); return; }

  const optionInputs = [...document.querySelectorAll(".option-input")];
  const options = optionInputs.map(i => i.value.trim()).filter(Boolean);
  if (options.length < 2) { toast("Tambahkan minimal 2 pilihan.", "warn"); return; }

  const ref  = doc(db, "sessions", name);
  const snap = await getDoc(ref);
  if (snap.exists()) { toast("❌ Judul polling sudah digunakan!", "error"); return; }

  const creatorDeviceId = getDeviceId();
  await setDoc(ref, { active: true, createdAt: Date.now(), creatorDeviceId });

  await Promise.all(
    options.map(opt => addDoc(collection(db, `sessions/${name}/candidates`), { name: opt, votes: 0 }))
  );

  // Reset form
  document.getElementById("sessionName").value = "";
  document.getElementById("options-list").innerHTML = "";
  addOptionField();
  addOptionField();

  toast(`✅ Polling "${name}" berhasil dibuat dengan ${options.length} pilihan!`);
};

// ── TOGGLE SESSION ────────────────────────
window.toggleSession = async (id, current) => {
  const sessionSnap = await getDoc(doc(db, "sessions", id));
  if (!sessionSnap.exists()) { toast("❌ Sesi tidak ditemukan.", "error"); return; }

  if (sessionSnap.data().creatorDeviceId !== getDeviceId()) {
    toast("🚫 Hanya pembuat sesi yang bisa mengubah status ini.", "error");
    return;
  }

  await updateDoc(doc(db, "sessions", id), { active: !current });
  toast(`Polling "${id}" ${current ? "ditutup" : "dibuka"}.`);
};

// ── CONFIRM MODAL ─────────────────────────
function showConfirm(title, msg, onConfirm) {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">${title}</div>
      <div class="modal-msg">${msg}</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">Batal</button>
        <button class="btn btn-red"   id="modal-ok">Hapus</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  const close = () => backdrop.remove();
  backdrop.querySelector("#modal-cancel").onclick = close;
  backdrop.querySelector("#modal-ok").onclick = () => { close(); onConfirm(); };
  backdrop.addEventListener("click", e => { if (e.target === backdrop) close(); });
}

// ── DELETE SESSION ────────────────────────
window.deleteSession = (id) => {
  showConfirm(
    "🗑️ Hapus Sesi",
    `Yakin ingin menghapus sesi <strong>"${id}"</strong>?<br>Semua kandidat dan data vote akan terhapus permanen.`,
    async () => {
      try {
        // Verifikasi kepemilikan sebelum hapus
        const sessionSnap = await getDoc(doc(db, "sessions", id));
        if (!sessionSnap.exists()) { toast("❌ Sesi tidak ditemukan.", "error"); return; }

        const sData = sessionSnap.data();
        const myDeviceId = getDeviceId();

        if (sData.creatorDeviceId !== myDeviceId) {
          toast("🚫 Kamu bukan pembuat sesi ini.", "error");
          return;
        }

        const [cSnap, vSnap, iSnap] = await Promise.all([
          getDocs(collection(db, `sessions/${id}/candidates`)),
          getDocs(collection(db, `sessions/${id}/voters`)),
          getDocs(collection(db, `sessions/${id}/ipVotes`)),
        ]);

        await Promise.all([
          ...cSnap.docs.map(d => deleteDoc(d.ref)),
          ...vSnap.docs.map(d => deleteDoc(d.ref)),
          ...iSnap.docs.map(d => deleteDoc(d.ref)),
        ]);

        await deleteDoc(doc(db, "sessions", id));
        toast(`🗑️ Polling "${id}" berhasil dihapus.`);
      } catch (e) {
        toast(`❌ Gagal: ${e.message || e.code || "unknown error"}`, "error");
        console.error(e);
      }
    }
  );
};

// ── RENDER CANDIDATES ─────────────────────
function renderCandidates(sessionId, cSnap, container, isActive, isVoter, showResults) {
  if (cSnap.empty) {
    container.innerHTML = `<div class="empty"><p>Belum ada kandidat.</p></div>`;
    return;
  }

  const docs = [];
  cSnap.forEach(c => docs.push({ id: c.id, ...c.data() }));

  const totalVotes = docs.reduce((s, d) => s + (d.votes || 0), 0);

  container.innerHTML = "";
  docs.forEach(d => {
    const pct = totalVotes ? Math.round((d.votes / totalVotes) * 100) : 0;
    const row = document.createElement("div");
    row.className = "candidate-row";
    row.innerHTML = `
      <span class="cand-name">${d.name}</span>
      ${showResults
        ? `<span class="cand-votes">${d.votes} suara (${pct}%)</span>`
        : votedSessions.has(sessionId)
          ? `<span class="cand-votes" style="color:var(--accent)">✓ Kamu sudah memilih</span>`
          : `<span class="cand-votes" style="color:var(--ink-muted);font-style:italic">Hasil disembunyikan</span>`
      }
      <div class="cand-action">
        ${isVoter
          ? isActive
            ? votedSessions.has(sessionId)
              ? `<span class="badge badge-green">✓ Voted</span>`
              : `<button class="btn btn-primary btn-sm" onclick="vote('${sessionId}','${d.id}',this)">Vote</button>`
            : `<span class="badge badge-gray">Tutup</span>`
          : ""}
      </div>
      ${showResults ? `
      <div class="vote-bar-wrap">
        <div class="vote-bar" style="width:${pct}%"></div>
      </div>` : ""}
    `;
    container.appendChild(row);
  });
}

// ── SEARCH / FILTER ──────────────────────
window.filterSessions = (q) => {
  const val = q.trim().toLowerCase();
  const clearBtn = document.getElementById("search-clear");
  const countEl  = document.getElementById("search-count");

  clearBtn.classList.toggle("visible", val.length > 0);

  const cards = document.querySelectorAll("#voter-sessions .session-card");
  let visible = 0;

  cards.forEach(card => {
    const name = card.querySelector(".session-name")?.textContent.toLowerCase() || "";
    const match = name.includes(val);
    card.style.display = match ? "" : "none";
    if (match) visible++;
  });

  if (val && cards.length > 0) {
    countEl.style.display = "block";
    countEl.textContent = `${visible} dari ${cards.length} polling ditemukan`;
  } else {
    countEl.style.display = "none";
  }
};

window.clearSearch = () => {
  const input = document.getElementById("search-input");
  input.value = "";
  filterSessions("");
  input.focus();
};

// ── SHARE SESSION ─────────────────────────
window.shareSession = async (id) => {
  const url = new URL(location.href);
  url.hash = "";
  url.searchParams.set("poll", id);
  const shareUrl = url.toString();

  if (navigator.share) {
    try {
      await navigator.share({
        title: `VoteKu — ${id}`,
        text: `Ikut polling "${id}" di VoteKu!`,
        url: shareUrl,
      });
    } catch (e) {
      if (e.name !== "AbortError") copyToClipboard(shareUrl);
    }
  } else {
    copyToClipboard(shareUrl);
  }
};

function copyToClipboard(text) {
  navigator.clipboard?.writeText(text).then(() => {
    toast("🔗 Link disalin ke clipboard!");
  }).catch(() => {
    // fallback for older browsers
    const el = document.createElement("textarea");
    el.value = text; el.style.position = "fixed"; el.style.opacity = "0";
    document.body.appendChild(el); el.select();
    document.execCommand("copy");
    document.body.removeChild(el);
    toast("🔗 Link disalin ke clipboard!");
  });
}

// ── DEEP LINK: auto-scroll to ?poll=xxx ───
function handleDeepLink() {
  const params = new URLSearchParams(location.search);
  const pollId = params.get("poll");
  if (!pollId) return;

  // Switch to vote tab
  switchTab("vote");

  // Highlight the target card once rendered
  const tryHighlight = (attempts = 0) => {
    const cards = document.querySelectorAll("#voter-sessions .session-card");
    for (const card of cards) {
      if (card.querySelector(".session-name")?.textContent === pollId) {
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        card.style.outline = "2.5px solid var(--accent)";
        card.style.borderRadius = "var(--radius)";
        setTimeout(() => { card.style.outline = ""; }, 2500);
        return;
      }
    }
    if (attempts < 15) setTimeout(() => tryHighlight(attempts + 1), 300);
  };
  setTimeout(() => tryHighlight(), 400);
}

handleDeepLink();

// ── REALTIME LISTENER ────────────────────
// Track per-session vote totals & unsubscribe old listeners on re-render
const sessionVoteTotals = new Map();   // id → vote count
let   candidateUnsubs   = new Map();   // id → unsubscribe fn
let   sessionCount = 0;
let   activeCount  = 0;

function updateStats() {
  let total = 0;
  sessionVoteTotals.forEach(v => total += v);
  document.getElementById("stat-sessions").textContent = sessionCount;
  document.getElementById("stat-active").textContent   = activeCount;
  document.getElementById("stat-votes").textContent    = total;
}

onSnapshot(collection(db, "sessions"), (snap) => {
  const voterContainer = document.getElementById("voter-sessions");
  const adminContainer = document.getElementById("admin-sessions");

  // Unsubscribe all old candidate listeners before re-render
  candidateUnsubs.forEach(unsub => unsub());
  candidateUnsubs.clear();
  sessionVoteTotals.clear();

  voterContainer.innerHTML = "";
  adminContainer.innerHTML = "";

  if (snap.empty) {
    voterContainer.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>Belum ada polling.</p></div>`;
    adminContainer.innerHTML = `<div class="empty"><p>Belum ada polling.</p></div>`;
    sessionCount = 0; activeCount = 0; updateStats();
    return;
  }

  sessionCount = 0; activeCount = 0;
  const myDeviceId = getDeviceId();

  snap.forEach(docSnap => {
    const data = docSnap.data();
    const id   = docSnap.id;
    sessionCount++;
    if (data.active) activeCount++;
    sessionVoteTotals.set(id, 0);

    // ── Voter card
    const vCard = document.createElement("div");
    vCard.className = "session-card";
    vCard.innerHTML = `
      <div class="session-header">
        <span class="session-name">${id}</span>
        <div class="session-header-right">
          <span class="badge ${data.active ? "badge-green" : "badge-red"}">
            ${data.active ? "🟢 Aktif" : "🔴 Ditutup"}
          </span>
          <button class="btn btn-ghost btn-sm share-btn" onclick="shareSession('${id}')" title="Bagikan">
            🔗 Bagikan
          </button>
        </div>
      </div>
      <div class="candidates-list" id="vc-${id}">
        <p style="color:var(--ink-muted);font-size:.85rem">Memuat kandidat...</p>
      </div>
    `;
    voterContainer.appendChild(vCard);

    // ── Admin card
    const isOwner = data.creatorDeviceId === myDeviceId;
    const aCard = document.createElement("div");
    aCard.className = "session-card";
    aCard.style.marginBottom = "10px";
    aCard.innerHTML = `
      <div class="session-header">
        <div>
          <span class="session-name">${id}</span>
          ${isOwner ? `<span style="font-size:.72rem;color:var(--accent);font-weight:600;margin-left:8px;">✏️ Milik kamu</span>` : ""}
        </div>
        <div class="session-header-right">
          <span class="badge ${data.active ? "badge-green" : "badge-gray"}">
            ${data.active ? "Aktif" : "Nonaktif"}
          </span>
        </div>
      </div>
      <div class="manage-actions">
        ${isOwner ? `
        <button class="btn btn-ghost btn-sm" onclick="toggleSession('${id}',${data.active})">
          ${data.active ? "⏸ Tutup" : "▶ Buka"}
        </button>
        <button class="btn btn-red btn-sm" onclick="deleteSession('${id}')">🗑️ Hapus</button>
        ` : `<span style="font-size:.78rem;color:var(--ink-muted);">Dibuat orang lain</span>`}
      </div>
      <div class="candidates-list" id="ac-${id}"></div>
    `;
    adminContainer.appendChild(aCard);

    // ── Realtime candidates (store unsubscribe fn)
    const unsub = onSnapshot(collection(db, `sessions/${id}/candidates`), (cSnap) => {
      let sessionTotal = 0;
      cSnap.forEach(c => { sessionTotal += (c.data().votes || 0); });
      sessionVoteTotals.set(id, sessionTotal);   // update only this session

      const vcDiv = document.getElementById(`vc-${id}`);
      const acDiv = document.getElementById(`ac-${id}`);

      if (vcDiv) renderCandidates(id, cSnap, vcDiv, data.active, true, isOwner);
      if (acDiv) renderCandidates(id, cSnap, acDiv, data.active, false, true);

      updateStats();
    });
    candidateUnsubs.set(id, unsub);
  });

  // Re-apply search filter after re-render
  const q = document.getElementById("search-input")?.value || "";
  if (q) filterSessions(q);
});
</script>


<script>
// ── SERVICE WORKER (inline blob) ─────────
if ("serviceWorker" in navigator) {
  const sw = `
    const CACHE = "voteku-v2";
    self.addEventListener("install", e => { self.skipWaiting(); });
    self.addEventListener("activate", e => {
      e.waitUntil(caches.keys().then(ks =>
        Promise.all(ks.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener("fetch", e => {
      if (e.request.mode === "navigate") {
        e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
      }
    });
  `;
  const swURL = URL.createObjectURL(new Blob([sw], { type: "application/javascript" }));
  navigator.serviceWorker.register(swURL, { scope: "./" }).catch(() => {});
}
</script>
